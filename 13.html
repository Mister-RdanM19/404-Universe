<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Shadow Play | Mr.Rm19</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            background-color: #ededed;
            color: #333;
            font-family: 'Arial Black', sans-serif;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .shadow-container {
            position: relative;
            user-select: none;
        }

        h1 {
            font-size: clamp(100px, 25vw, 250px);
            margin: 0;
            position: relative;
            z-index: 2;
            color: #ededed; /* Sama dengan background */
            text-shadow: 1px 1px 1px rgba(255,255,255,0.5);
        }

        /* Bayangan dinamis akan diatur via JS */
        #dynamic-shadow {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            color: rgba(0, 0, 0, 0.15);
            pointer-events: none;
        }

        .info {
            text-align: center;
            margin-top: -20px;
            z-index: 10;
        }

        p {
            font-family: 'Segoe UI', sans-serif;
            letter-spacing: 5px;
            font-weight: bold;
            color: #888;
            text-transform: uppercase;
        }

        .btn-back {
            margin-top: 30px;
            padding: 10px 25px;
            border: 2px solid #333;
            color: #333;
            text-decoration: none;
            font-family: 'Segoe UI', sans-serif;
            font-weight: bold;
            transition: 0.3s;
            display: inline-block;
        }

        .btn-back:hover {
            background: #333;
            color: #fff;
        }

        /* Credit Footer */
        .credit-footer {
            position: absolute;
            bottom: 20px;
            font-family: 'Segoe UI', sans-serif;
            font-size: 0.8rem;
            color: #aaa;
        }

        .credit-footer span {
            color: #666;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="shadow-container">
        <h1 id="text">404</h1>
    </div>

    <div class="info">
        <p>Halaman Tak Berbayang</p>
        <a href="/" class="btn-back">KEMBALI KE TERANG</a>
    </div>

    <div class="credit-footer">
        Visual Design by <span>Mr.Rm19</span> — ramdan19id@gmail.com
    </div>

    <script>
        const text = document.getElementById('text');
        const container = document.body;

        container.addEventListener('mousemove', (e) => {
            let x = e.clientX;
            let y = e.clientY;

            // Kalkulasi posisi tengah layar
            let middleX = window.innerWidth / 2;
            let middleY = window.innerHeight / 2;

            // Jarak kursor dari tengah
            let walkX = (x - middleX) / 10; 
            let walkY = (y - middleY) / 10;

            // Terapkan shadow multipel untuk efek halus
            text.style.textShadow = `
                ${walkX}px ${walkY}px 0 rgba(0,0,0,0.07),
                ${walkX * 2}px ${walkY * 2}px 5px rgba(0,0,0,0.05),
                ${walkX * 3}px ${walkY * 3}px 10px rgba(0,0,0,0.03)
            `;
        });
    </script>
</body>
</html>
