<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Security Feed | Mr.Rm19</title>
    <style>
        body, html { height: 100%; margin: 0; background: #000; color: #fff; font-family: 'Courier New', monospace; overflow: hidden; }
        
        /* Scanline & Noise Effect */
        body::before { content: " "; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); z-index: 2; background-size: 100% 2px, 3px 100%; pointer-events: none; }
        
        .cctv-ui { position: absolute; top: 20px; left: 20px; border-left: 2px solid #fff; border-top: 2px solid #fff; padding: 10px; z-index: 5; }
        .rec { color: red; animation: blink 1s infinite; font-weight: bold; }
        
        .main-content { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        
        h1 { font-size: 120px; margin: 0; letter-spacing: 10px; opacity: 0.8; }
        .status { background: #fff; color: #000; padding: 5px 15px; font-weight: bold; margin-bottom: 20px; }

        @keyframes blink { 50% { opacity: 0; } }

        .btn-exit { border: 1px solid #fff; color: #fff; padding: 10px 20px; text-decoration: none; margin-top: 30px; transition: 0.3s; z-index: 10; }
        .btn-exit:hover { background: #fff; color: #000; }

        .credit-footer { position: absolute; bottom: 20px; right: 20px; font-size: 0.8rem; color: #555; }
        .credit-footer span { color: #fff; }
    </style>
</head>
<body>

    <div class="cctv-ui">
        <div>CAM 01 - <span class="rec">● REC</span></div>
        <div id="clock">00:00:00</div>
    </div>

    <div class="main-content">
        <div class="status">SIGNAL LOST</div>
        <h1>404</h1>
        <p>OBJECT NOT FOUND IN PERIMETER</p>
        <a href="/" class="btn-exit">RETURN TO BASE</a>
    </div>

    <div class="credit-footer">Surveillance by <span>Mr.Rm19</span> — ramdan19id@gmail.com</div>

    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString();
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
