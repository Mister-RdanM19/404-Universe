<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Pac-Man Edition | Mr.Rm19</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            background-color: #000;
            color: #fceb05; /* Pac-Man Yellow */
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        /* Maze Container */
        .maze {
            position: relative;
            width: 320px;
            height: 150px;
            border: 4px solid #2121ff; /* Classic Blue Wall */
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-shadow: 0 0 20px rgba(33, 33, 255, 0.5);
        }

        .error-code {
            font-size: 80px;
            font-weight: bold;
            letter-spacing: 10px;
            position: relative;
            z-index: 2;
            color: #fff;
            text-shadow: 2px 2px #2121ff;
        }

        /* Characters */
        .pacman {
            width: 40px;
            height: 40px;
            background: #fceb05;
            border-radius: 50%;
            position: absolute;
            top: 10px;
            left: -50px;
            clip-path: polygon(100% 0%, 100% 100%, 50% 50%, 100% 0%, 100% 0%); /* Mouth */
            animation: movePacman 6s linear infinite, chomp 0.3s ease-in-out infinite;
        }

        .ghost {
            width: 35px;
            height: 35px;
            position: absolute;
            bottom: 10px;
            right: -50px;
            border-radius: 50% 50% 0 0;
            animation: moveGhost 6s linear infinite;
        }

        .ghost::before { /* Eyes */
            content: '• •';
            position: absolute;
            top: 5px;
            left: 7px;
            color: white;
            font-size: 18px;
        }

        .ghost-red { background: #ff0000; box-shadow: 0 0 10px #ff0000; animation-delay: 0.5s; }

        /* Animations */
        @keyframes movePacman {
            0% { left: -50px; transform: scaleX(1); }
            45% { left: 110%; transform: scaleX(1); }
            50% { left: 110%; transform: scaleX(-1); }
            95% { left: -50px; transform: scaleX(-1); }
            100% { left: -50px; transform: scaleX(1); }
        }

        @keyframes chomp {
            0%, 100% { clip-path: polygon(100% 0%, 100% 100%, 50% 50%, 100% 0%); }
            50% { clip-path: polygon(100% 45%, 100% 55%, 50% 50%, 100% 45%); }
        }

        @keyframes moveGhost {
            0% { right: -50px; }
            100% { right: 110%; }
        }

        /* Content */
        .content {
            text-align: center;
            margin-top: 30px;
        }

        .insert-coin {
            font-size: 1rem;
            color: #fceb05;
            animation: blink 0.8s infinite;
            text-transform: uppercase;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        .btn-restart {
            margin-top: 20px;
            padding: 10px 20px;
            border: 2px solid #2121ff;
            color: #fff;
            text-decoration: none;
            display: inline-block;
            transition: 0.3s;
        }

        .btn-restart:hover {
            background: #2121ff;
            box-shadow: 0 0 15px #2121ff;
        }

        /* Credit Footer */
        .credit-footer {
            position: absolute;
            bottom: 20px;
            text-align: center;
            font-size: 0.8rem;
            color: #555;
            letter-spacing: 1px;
        }

        .credit-footer span {
            color: #fceb05;
        }
    </style>
</head>
<body>

    <div class="maze">
        <div class="pacman"></div>
        <div class="ghost ghost-red"></div>
        <div class="error-code">404</div>
    </div>

    <div class="content">
        <p class="insert-coin">Game Over - Page Not Found</p>
        <p style="color: #888;">Hantu telah memakan halaman ini!</p>
        <a href="#" class="btn-restart">INSERT COIN (HOME)</a>
    </div>

    <div class="credit-footer">
        Project by <span>Mr.Rm19</span> — ramdan19id@gmail.com
    </div>

</body>
</html>
