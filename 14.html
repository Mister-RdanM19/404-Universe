<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Paper Plane | Mr.Rm19</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            background-color: #f0f4f8; /* Soft Sky Blue */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        /* Container Pesawat */
        .sky {
            position: relative;
            width: 100%;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        h1 {
            font-size: 150px;
            font-weight: 900;
            color: #d1d9e6;
            margin: 0;
            letter-spacing: 10px;
            user-select: none;
        }

        /* Animasi Pesawat Kertas */
        .paper-plane {
            position: absolute;
            font-size: 50px;
            z-index: 10;
            animation: fly 6s linear infinite;
        }

        @keyframes fly {
            0% { transform: translate(-200px, 50px) rotate(10deg); }
            25% { transform: translate(0px, -50px) rotate(-10deg); }
            50% { transform: translate(200px, 50px) rotate(10deg); }
            75% { transform: translate(0px, 150px) rotate(20deg); }
            100% { transform: translate(-200px, 50px) rotate(10deg); }
        }

        .content {
            text-align: center;
            margin-top: -20px;
        }

        h2 {
            color: #5d6d7e;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .btn-land {
            margin-top: 20px;
            padding: 10px 30px;
            background-color: #5d6d7e;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: 0.3s;
            display: inline-block;
        }

        .btn-land:hover {
            background-color: #2c3e50;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        /* Credit Footer */
        .credit-footer {
            position: absolute;
            bottom: 20px;
            font-size: 0.85rem;
            color: #abb2b9;
        }

        .credit-footer span {
            color: #5d6d7e;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="sky">
        <div class="paper-plane">✈️</div>
        <h1>404</h1>
    </div>

    <div class="content">
        <h2>TERBAWA ANGIN...</h2>
        <p style="color: #85929e;">Halaman yang kamu cari terbang entah ke mana.</p>
        <a href="/" class="btn-land">MENDARAT DI HOME</a>
    </div>

    <div class="credit-footer">
        Aero-Design by <span>Mr.Rm19</span> — ramdan19id@gmail.com
    </div>

</body>
</html>
