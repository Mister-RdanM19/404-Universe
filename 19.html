<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Deep Sea | Mr.Rm19</title>
    <style>
        body, html { height: 100%; margin: 0; background: #00050a; overflow: hidden; display: flex; align-items: center; justify-content: center; font-family: sans-serif; }
        
        .ocean { position: absolute; width: 100%; height: 100%; background: linear-gradient(to bottom, #001a33 0%, #00050a 100%); z-index: 1; }
        
        /* Spotlight Effect */
        .spotlight { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, transparent 50px, rgba(0,0,0,0.95) 150px); z-index: 5; pointer-events: none; }

        .content { text-align: center; z-index: 2; }
        
        h1 { font-size: 150px; color: #003366; text-shadow: 0 0 20px rgba(0, 51, 102, 0.5); margin: 0; font-weight: 900; }
        
        p { color: #004d99; letter-spacing: 5px; margin-top: -20px; font-weight: bold; }

        .btn-surface { margin-top: 40px; padding: 10px 25px; border: 1px solid #004d99; color: #004d99; text-decoration: none; border-radius: 2px; transition: 0.5s; display: inline-block; }
        .btn-surface:hover { background: #004d99; color: #fff; box-shadow: 0 0 30px #004d99; }

        .bubble { position: absolute; background: rgba(255,255,255,0.1); border-radius: 50%; animation: rise 10s infinite ease-in; z-index: 1; }
        @keyframes rise { from { transform: translateY(100vh) scale(0); } to { transform: translateY(-10vh) scale(1); } }

        .credit-footer { position: absolute; bottom: 20px; color: #00264d; font-size: 0.8rem; z-index: 10; }
        .credit-footer span { color: #004d99; }
    </style>
</head>
<body>

    <div class="ocean" id="ocean"></div>
    <div class="spotlight" id="spotlight"></div>

    <div class="content">
        <h1>404</h1>
        <p>TENGGELAM DALAM KESUNYIAN</p>
        <a href="/" class="btn-surface">NAIK KE PERMUKAAN</a>
    </div>

    <div class="credit-footer">Deep Search by <span>Mr.Rm19</span> — ramdan19id@gmail.com</div>

    <script>
        const spotlight = document.getElementById('spotlight');
        document.addEventListener('mousemove', e => {
            spotlight.style.background = `radial-gradient(circle at ${e.clientX}px ${e.clientY}px, transparent 80px, rgba(0,0,0,0.9) 200px)`;
        });

        // Bubble Generator
        const ocean = document.getElementById('ocean');
        for(let i=0; i<20; i++) {
            let bubble = document.createElement('div');
            bubble.className = 'bubble';
            let size = Math.random() * 20 + 5;
            bubble.style.width = size + 'px';
            bubble.style.height = size + 'px';
            bubble.style.left = Math.random() * 100 + '%';
            bubble.style.animationDuration = (Math.random() * 5 + 5) + 's';
            bubble.style.animationDelay = Math.random() * 5 + 's';
            ocean.appendChild(bubble);
        }
    </script>
</body>
</html>
