<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - System Terminal | Mr.Rm19</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            background-color: #0c0c0c;
            color: #15ff00; /* Classic Matrix/Terminal Green */
            font-family: 'Consolas', 'Courier New', monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .terminal-window {
            width: 90%;
            max-width: 700px;
            background: #1e1e1e;
            border-radius: 8px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            overflow: hidden;
            border: 1px solid #333;
        }

        .terminal-header {
            background: #333;
            padding: 10px;
            display: flex;
            gap: 8px;
        }

        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .red { background: #ff5f56; }
        .yellow { background: #ffbd2e; }
        .green { background: #27c93f; }

        .terminal-body {
            padding: 20px;
            font-size: 1rem;
            line-height: 1.5;
        }

        .prompt { color: #00ff00; }
        .command { color: #fff; }
        .error { color: #ff5f56; font-weight: bold; }
        
        .cursor {
            display: inline-block;
            width: 10px;
            height: 18px;
            background: #15ff00;
            margin-left: 5px;
            animation: blink 1s infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        .btn-home {
            color: #15ff00;
            text-decoration: none;
            border: 1px solid #15ff00;
            padding: 5px 15px;
            display: inline-block;
            margin-top: 20px;
            transition: 0.3s;
        }

        .btn-home:hover {
            background: #15ff00;
            color: #000;
        }

        /* Credit Footer */
        .credit-footer {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #444;
        }

        .credit-footer span {
            color: #15ff00;
        }
    </style>
</head>
<body>

    <div class="terminal-window">
        <div class="terminal-header">
            <div class="dot red"></div>
            <div class="dot yellow"></div>
            <div class="dot green"></div>
            <span style="margin-left: 10px; font-size: 0.8rem; color: #999;">guest@mr-rm19: ~/projects/404</span>
        </div>
        <div class="terminal-body">
            <div><span class="prompt">guest@mr-rm19:~$</span> <span class="command">find / -name "requested_page"</span></div>
            <div style="margin-bottom: 15px;">Searching...</div>
            
            <div class="error">ERROR 404: OBJECT_NOT_FOUND</div>
            <div style="color: #888;">Lokasi: /web/root/pages/</div>
            <div style="color: #888;">Status: File telah dipindahkan atau dihapus oleh Admin.</div>
            
            <div style="margin-top: 20px;">
                <span class="prompt">guest@mr-rm19:~$</span> <a href="/" class="btn-home">cd /home</a>
                <span class="cursor"></span>
            </div>
        </div>
    </div>

    <div class="credit-footer">
        Root Access by <span>Mr.Rm19</span> — ramdan19id@gmail.com
    </div>

</body>
</html>
