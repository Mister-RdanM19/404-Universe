<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - RPG Quest | Mr.Rm19</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            background-color: #111;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            overflow: hidden;
        }

        /* RPG Dialog Box */
        .dialog-box {
            width: 80%;
            max-width: 600px;
            background: #000080; /* Classic Blue RPG Background */
            border: 4px solid #fff;
            border-radius: 8px;
            padding: 20px;
            position: relative;
            box-shadow: 0 0 0 4px #000, 0 10px 20px rgba(0,0,0,0.5);
        }

        .dialog-text {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 30px;
            height: 60px;
        }

        /* Typing Effect Simulation */
        .typing {
            overflow: hidden;
            white-space: nowrap;
            border-right: 3px solid transparent;
            animation: typing 3s steps(40, end);
        }

        /* Menu Options */
        .options {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .options li {
            margin: 10px 0;
            padding-left: 30px;
            position: relative;
            cursor: pointer;
            transition: 0.2s;
        }

        .options li a {
            color: white;
            text-decoration: none;
            text-transform: uppercase;
        }

        /* Finger Cursor */
        .options li::before {
            content: '☞';
            position: absolute;
            left: 0;
            font-size: 1.5rem;
            opacity: 0;
            transition: 0.2s;
            animation: fingerMove 0.5s infinite alternate;
        }

        .options li:hover::before {
            opacity: 1;
        }

        /* Animations */
        @keyframes typing {
            from { width: 0 }
            to { width: 100% }
        }

        @keyframes fingerMove {
            from { transform: translateX(0); }
            to { transform: translateX(5px); }
        }

        .error-code {
            position: absolute;
            top: -40px;
            right: 20px;
            background: #fff;
            color: #000;
            padding: 5px 15px;
            font-weight: bold;
            border: 2px solid #000;
        }

        /* Credit Footer */
        .credit-footer {
            position: absolute;
            bottom: 20px;
            text-align: center;
            font-size: 0.8rem;
            color: #666;
            letter-spacing: 1px;
        }

        .credit-footer span {
            color: #fff;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="dialog-box">
        <div class="error-code">LVL. 404</div>
        <div class="dialog-text">
            <p class="typing">Kamu menemui jalan buntu...</p>
            <p style="font-size: 0.9rem; color: #aaa;">Halaman yang kamu cari telah menghilang.</p>
        </div>

        <ul class="options">
            <li><a href="/">➤ GUNAKAN TELEPORT (KEMBALI KE HOME)</a></li>
            <li><a href="https://github.com/Mister-RdanM19" target="_blank">➤ LIHAT EQUIPMENT (GITHUB)</a></li>
        </ul>
    </div>

    <div class="credit-footer">
        Project by <span>Mr.Rm19</span> — ramdan19id@gmail.com
    </div>

</body>
</html>
